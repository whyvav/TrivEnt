name: brick_erp
description: Brick Manufacturing ERP

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.27.0
  cloud_firestore: ^4.15.0
  firebase_auth: ^4.17.0

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  fl_chart: ^0.67.0          # Charts for dashboard

  # Utilities
  intl: ^0.19.0              # Date/number formatting
  uuid: ^4.3.3               # Generate unique IDs
  provider: ^6.1.2           # State management

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true